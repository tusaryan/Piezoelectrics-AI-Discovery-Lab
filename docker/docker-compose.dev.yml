services:
  db:
    image: postgres:16
    environment: 
      POSTGRES_DB: piezo_ai
      POSTGRES_USER: piezo
      POSTGRES_PASSWORD: piezo
    ports:
      - "5432:5432"
    volumes: 
      - "postgres_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piezo -d piezo_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes: 
  postgres_data:
