# Piezo.AI v2.1.0 — Docker Compose
# PostgreSQL database for local development

services:
  db:
    image: postgres:16-alpine
    container_name: piezo-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: piezo
      POSTGRES_PASSWORD: piezo
      POSTGRES_DB: piezo_ai
    ports:
      - "5432:5432"
    volumes:
      - piezo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piezo -d piezo_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  piezo_pgdata:
    name: piezo-ai-pgdata
